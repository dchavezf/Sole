<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=https://docs.google.com/forms/d/e/1FAIpQLSfh-qkBy-GXCR_RMD9pmJK5uN6CjYX_X4naCAeZpRHkRVQgpg/viewform">
  <title>Formulario de comentarios | Propuesta Solé</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --paper: #fffdf8;
      --ink: #1f2933;
      --muted: #5b6570;
      --line: #ded8cd;
      --brand: #29524a;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.55;
      padding: 20px;
    }

    main {
      width: min(100%, 560px);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(45, 38, 27, .10);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      line-height: 1.12;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    a {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      padding: 10px 15px;
      border-radius: 8px;
      background: var(--brand);
      color: white;
      text-decoration: none;
      font-weight: 800;
    }
  </style>
  <script>
    window.location.replace("https://docs.google.com/forms/d/e/1FAIpQLSfh-qkBy-GXCR_RMD9pmJK5uN6CjYX_X4naCAeZpRHkRVQgpg/viewform");
  </script>
</head>
<body>
  <main>
    <h1>Abriendo formulario</h1>
    <p>Te estamos redirigiendo al formulario de comentarios en Google Forms.</p>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSfh-qkBy-GXCR_RMD9pmJK5uN6CjYX_X4naCAeZpRHkRVQgpg/viewform">Abrir formulario</a>
  </main>
</body>
</html>
